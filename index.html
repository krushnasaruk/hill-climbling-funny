<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mountain Rush - 2D Physics Hill Climbing Game</title>
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts for premium design -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <!-- Matter.js Physics Engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
  <div id="game-container">
    <!-- Main Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Heads Up Display (HUD) -->
    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="stat-box">
          <span class="stat-label">DISTANCE</span>
          <span id="distance-val" class="stat-value">0 m</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">COINS</span>
          <span id="coins-val" class="stat-value">0</span>
        </div>
        <div id="fuel-container">
          <div class="stat-label">FUEL</div>
          <div class="fuel-bar-outer">
            <div id="fuel-bar-inner"></div>
          </div>
        </div>
      </div>
      
      <!-- Speedometer overlay -->
      <div class="hud-speedometer">
        <div class="speed-dial">
          <div class="speed-value" id="speed-val">0</div>
          <div class="speed-unit">KM/H</div>
        </div>
      </div>
      
      <!-- Audio & Restart top actions -->
      <div class="hud-actions">
        <button id="mute-btn" class="icon-btn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path id="mute-icon-path" fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Menu Overlay -->
    <div id="main-menu" class="overlay">
      <div class="menu-card glass">
        <h1 class="game-title">MOUNTAIN RUSH</h1>
        <p class="game-subtitle">A Physics-Based 2D Hill Climbing Adventure</p>
        
        <div class="controls-guide">
          <h3>CONTROLS</h3>
          <div class="guide-grid">
            <div class="guide-item">
              <span class="key">D</span> or <span class="key">&rarr;</span>
              <span class="action">GAS / TILT BACKWARD</span>
            </div>
            <div class="guide-item">
              <span class="key">A</span> or <span class="key">&larr;</span>
              <span class="action">BRAKE & REVERSE / TILT FORWARD</span>
            </div>
          </div>
        </div>

        <button id="start-btn" class="btn primary-btn">LAUNCH VEHICLE</button>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over" class="overlay hidden">
      <div class="menu-card glass">
        <h2 id="game-over-title" class="danger-title">VEHICLE WRECKED</h2>
        <p id="game-over-reason" class="game-subtitle">Your driver's neck snapped!</p>
        
        <div class="stats-summary">
          <div class="summary-box">
            <span class="stat-label">DISTANCE REACHED</span>
            <span id="final-distance" class="stat-value highlight">0 m</span>
          </div>
          <div class="summary-box">
            <span class="stat-label">COINS COLLECTED</span>
            <span id="final-coins" class="stat-value highlight">0</span>
          </div>
        </div>

        <button id="restart-btn" class="btn primary-btn">REDEPLOY VEHICLE</button>
      </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls" class="hidden">
      <!-- Left side: Brake / Tilt Forward -->
      <button id="btn-brake" class="touch-btn brake-pedal">
        <div class="pedal-face">
          <span>BRAKE</span>
          <span class="sub-label">TILT &larr;</span>
        </div>
      </button>

      <!-- Right side: Gas / Tilt Backward -->
      <button id="btn-gas" class="touch-btn gas-pedal">
        <div class="pedal-face">
          <span>GAS</span>
          <span class="sub-label">TILT &rarr;</span>
        </div>
      </button>
    </div>
  </div>

  <!-- Game Modules JavaScript -->
  <script src="js/audio.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/vehicle.js"></script>
  <script src="js/terrain.js"></script>
  <script src="js/collectibles.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
